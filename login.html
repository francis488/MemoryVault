<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><link rel="stylesheet" href="style.css">
    <title>Login | Vault Pro</title>
</head>
<body class="auth-screen">
    <div class="auth-card">
        <div class="brand-icon">🔑</div>
        <h2 style="font-weight:900;">Welcome Back</h2>
        <form onsubmit="handleLogin(event)">
            <div class="auth-group"><label>EMAIL ADDRESS</label><input type="email" id="email" class="auth-input" required></div>
            <div class="auth-group"><label>PASSWORD</label>
                <div class="pass-wrapper">
                    <input type="password" id="pass" class="auth-input" required>
                    <button type="button" class="toggle-btn" onclick="togglePass('pass', this)">👁️</button>
                </div>
            </div>
            <button type="submit" class="btn-primary">UNLOCK VAULT</button>
        </form>
        <p style="margin-top:20px;"><a href="reset.html" style="color:var(--primary); font-weight:800; text-decoration:none;">Forgot Password?</a></p>
    </div>
    <script src="script.js"></script>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const profile = JSON.parse(localStorage.getItem('profile_' + email));
            if (profile && profile.pass === pass) {
                localStorage.setItem('currentUser', JSON.stringify({name: profile.name, email: profile.email}));
                window.location.href = 'index.html';
            } else { alert("Invalid Credentials"); }
        }
    </script>
</body>
</html>
